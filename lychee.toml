# Increase timeout for AMD PDF and documentation links, which can be slow
timeout = 30

# Retry transient failures (e.g., GitHub rate limiting, flaky CDN)
max_retries = 3

# Accept 429 (rate limited) as non-failure — the link exists, we're just throttled
# Accept 206 (partial content) for PDF/media links
accept = [200, 206, 429]

# Skip anchor fragment validation — anchors change frequently and cause false positives
include_fragments = false

# Exclude patterns that reliably cause false positives with automated checkers
exclude = [
  # LinkedIn blocks automated link checks
  "^https?://(www\\.)?linkedin\\.com",
  # Reddit returns 403 to bots/CI environments
  "^https?://(www\\.)?reddit\\.com",
  # AMD's PDF CDN is slow and often returns transient errors to bots
  "^https?://www\\.amd\\.com/content/dam/.*\\.pdf",
  # Local/relative anchors
  "^#",
]

# Do not check files in .git
exclude_path = [".git"]

# User agent to use for requests
user_agent = "lychee"
